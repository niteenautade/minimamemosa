<!DOCTYPE html>
<html>
<head>
<script type="importmap">
{
  "imports": {
    "@tiptap/core": "https://esm.sh/@tiptap/core@2.6.6",
    "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@2.6.6",
    "@tiptap/extension-placeholder": "https://esm.sh/@tiptap/extension-placeholder@2.6.6",
    "tiptap-markdown": "https://esm.sh/tiptap-markdown@0.8.10?external=@tiptap/core,@tiptap/pm"
  }
}
</script>
</head>
<body>
<div id="memo-editor"></div>
<script type="module">
  try {
    const [{Editor}, {StarterKit}, {Placeholder}, {Markdown}] = await Promise.all([
        import('@tiptap/core'),
        import('@tiptap/starter-kit'),
        import('@tiptap/extension-placeholder'),
        import('tiptap-markdown'),
    ]);
    console.log("Modules loaded successfully", !!Editor, !!StarterKit, !!Markdown);
    window.tiptapEditor = new Editor({
        element: document.getElementById('memo-editor'),
        extensions: [ StarterKit, Markdown ]
    });
    console.log("Editor init success", !!document.querySelector('.ProseMirror'));
  } catch(e) {
    console.error("PAGE_ERROR_CUSTOM", e.message);
  }
</script>
</body>
</html>
